<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeciVote – Blockchain Voting System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0033 50%, #0f0a1e 100%);
            font-family: 'Orbitron', system-ui;
            padding: 40px 20px;
            color: #eee;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 170, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
            pointer-events: none;
            animation: bgShift 8s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes bgShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px; 
            padding: 28px;
            border: 2px solid rgba(0, 170, 255, 0.3);
            box-shadow: 
                0 0 30px rgba(0, 170, 255, 0.2),
                inset 0 0 30px rgba(0, 170, 255, 0.05);
            animation: containerGlow 3s ease-in-out infinite;
        }
        
        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 170, 255, 0.2), inset 0 0 30px rgba(0, 170, 255, 0.05); }
            50% { box-shadow: 0 0 40px rgba(0, 170, 255, 0.3), inset 0 0 30px rgba(0, 170, 255, 0.08); }
        }
        
        h1, h2 { 
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00ffff, #00aeff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
            margin-bottom: 20px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 170, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 170, 255, 0.6)); }
        }
        
        .page { 
            display: none;
            animation: fadeIn 0.6s ease-out;
        }
        
        .page.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        button { 
            background: linear-gradient(135deg, #00aeff, #0088ff);
            color: #000;
            border: 2px solid rgba(0, 170, 255, 0.5);
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px 0;
            font-family: 'Orbitron', system-ui;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        
        button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        button:hover { 
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.6);
            transform: translateY(-3px);
        }
        
        button:active {
            transform: translateY(-1px);
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.8);
        }
        
        input { 
            background: rgba(30, 42, 58, 0.8);
            border: 2px solid rgba(0, 170, 255, 0.3);
            padding: 12px 16px;
            border-radius: 40px;
            color: #00ff00;
            width: 100%;
            margin: 8px 0;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.1);
        }
        
        input:focus {
            outline: none;
            border-color: rgba(0, 170, 255, 0.8);
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.2), 0 0 20px rgba(0, 170, 255, 0.3);
            color: #00ffff;
        }
        
        input::placeholder { color: rgba(0, 170, 255, 0.5); }
        
        .election-card { 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.6), rgba(30, 42, 58, 0.3));
            border-radius: 20px; 
            padding: 16px;
            margin-bottom: 16px; 
            border-left: 4px solid #00ffff;
            border: 2px solid rgba(0, 170, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .election-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 170, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .election-card:hover {
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.3);
            border-color: rgba(0, 170, 255, 0.5);
        }
        
        .election-card:hover::before {
            left: 100%;
        }
        
        .candidate-card { 
            background: linear-gradient(135deg, rgba(30, 42, 58, 0.6), rgba(15, 23, 42, 0.4));
            border-radius: 16px; 
            padding: 12px 16px;
            margin-bottom: 10px; 
            display: flex;
            align-items: center; 
            gap: 16px; 
            cursor: pointer;
            border: 2px solid rgba(0, 170, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .candidate-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 170, 255, 0.1) 50%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .candidate-card:hover {
            transform: translateX(4px);
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.2);
            border-color: rgba(0, 170, 255, 0.4);
        }
        
        .candidate-card:hover::before {
            opacity: 1;
        }
        
        .candidate-card.selected { 
            background: linear-gradient(135deg, rgba(0, 170, 255, 0.15), rgba(0, 170, 255, 0.05));
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.4), inset 0 0 15px rgba(0, 170, 255, 0.1);
            animation: selectedPulse 1s ease-in-out infinite;
        }
        
        @keyframes selectedPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 170, 255, 0.4), inset 0 0 15px rgba(0, 170, 255, 0.1); }
            50% { box-shadow: 0 0 30px rgba(0, 170, 255, 0.6), inset 0 0 20px rgba(0, 170, 255, 0.15); }
        }
        
        .radio { 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            border: 2px solid #00aeff;
            display: inline-block; 
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.3);
            flex-shrink: 0;
        }
        
        .candidate-card.selected .radio {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.6);
            animation: radioPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes radioPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 170, 255, 0.6); }
            50% { box-shadow: 0 0 25px rgba(0, 170, 255, 1); }
        }
        
        .candidate-card.selected .radio::after { 
            content: '';
            width: 12px;
            height: 12px;
            background: #00ffff;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
            animation: radioBurst 0.5s ease-out;
        }
        
        @keyframes radioBurst {
            0% {
                width: 0;
                height: 0;
                top: 10px;
                left: 10px;
                opacity: 1;
            }
            100% {
                width: 12px;
                height: 12px;
                top: 4px;
                left: 4px;
                opacity: 1;
            }
        }
        
        .btn-cast {
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        .btn-cast.ready {
            opacity: 1;
            cursor: pointer;
            animation: castReady 0.5s ease-out;
        }
        
        .btn-cast:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @keyframes castReady {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .tx-receipt { 
            background: linear-gradient(135deg, rgba(10, 15, 30, 0.9), rgba(15, 23, 42, 0.8));
            border-radius: 20px; 
            padding: 16px;
            margin: 16px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            border: 2px solid rgba(0, 255, 0, 0.3);
            box-shadow: 
                inset 0 0 20px rgba(0, 255, 0, 0.1),
                0 0 20px rgba(0, 170, 255, 0.2);
            color: #00ff00;
            line-height: 1.8;
            animation: terminalScroll 1s ease-out;
        }
        
        @keyframes terminalScroll {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tx-receipt div {
            margin-bottom: 8px;
            word-break: break-all;
            animation: textReveal 0.5s ease-out forwards;
        }
        
        .tx-receipt div:nth-child(1) { animation-delay: 0.1s; }
        .tx-receipt div:nth-child(2) { animation-delay: 0.2s; }
        .tx-receipt div:nth-child(3) { animation-delay: 0.3s; }
        .tx-receipt div:nth-child(4) { animation-delay: 0.4s; }
        .tx-receipt div:nth-child(5) { animation-delay: 0.5s; }
        
        @keyframes textReveal {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .loading, .error {
            text-align: center;
            padding: 20px;
            border-radius: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .loading {
            color: #00aeff;
            background: rgba(0, 170, 255, 0.1);
            border: 2px solid rgba(0, 170, 255, 0.3);
            animation: loadingPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes loadingPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .error {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid rgba(255, 68, 68, 0.3);
        }
        
        .flex { 
            display: flex; 
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .flex button { flex: 1; min-width: 120px; }
        
        .status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid;
            animation: statusGlow 2s ease-in-out infinite;
        }
        
        .status.active {
            background: rgba(0, 170, 255, 0.15);
            color: #00ffff;
            border-color: #00aeff;
        }
        
        .status.voted {
            background: rgba(0, 255, 100, 0.15);
            color: #00ff64;
            border-color: #00aa33;
        }
        
        @keyframes statusGlow {
            0%, 100% { filter: drop-shadow(0 0 5px currentColor); }
            50% { filter: drop-shadow(0 0 10px currentColor); }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- LOGIN PAGE -->
    <div id="page-login" class="page active">
        <h1>🗳️ DeciVote</h1>
        <p style="margin-bottom: 20px; text-align: center; color: #00aeff; font-size: 0.9rem; letter-spacing: 1px;">SECURE BLOCKCHAIN VOTING SYSTEM</p>
        <input type="text" id="voterId" placeholder="Enter your wallet address (0x...)">
        <button id="connectWalletBtn">🦊 CONNECT METAMASK</button>
        <button id="loginBtn">🔓 LOGIN & CONTINUE</button>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="page-dashboard" class="page">
        <h1>⚡ Welcome <span id="voterIdDisplay"></span></h1>
        <button id="logoutBtn" style="margin-bottom: 20px; width: 100%;">🚪 LOGOUT</button>
        <h2>📋 Active Elections</h2>
        <div id="electionList"></div>
    </div>

    <!-- VOTING PAGE -->
    <div id="page-voting" class="page">
        <h2 id="votingElectionName">⚙️ Select Candidate</h2>
        <div id="candidatesGrid" style="margin-bottom: 20px;"></div>
        <div id="selectedPreview" style="margin-bottom: 16px; padding: 12px; border-radius: 12px; background: rgba(0, 170, 255, 0.1); border: 2px solid rgba(0, 170, 255, 0.3); color: #00ffff; font-size: 0.9rem; min-height: 40px; display: flex; align-items: center; justify-content: center; text-align: center;">No candidate selected</div>
        <div class="flex">
            <button id="backToDashboard">← BACK</button>
            <button id="castBtn" class="btn-cast">🗳️ CAST VOTE</button>
        </div>
    </div>

    <!-- CONFIRMATION PAGE -->
    <div id="page-confirm" class="page">
        <h1>✅ VOTE CONFIRMED!</h1>
        <p style="text-align: center; margin-bottom: 20px; color: #00ff64;">Your vote has been permanently recorded on the blockchain.</p>
        <div class="tx-receipt">
            <div><strong>TX Hash:</strong> <span id="confirmTxHash"></span></div>
            <div><strong>Block Height:</strong> <span id="confirmBlock"></span></div>
            <div><strong>Election:</strong> <span id="confirmElection"></span></div>
            <div><strong>Voter Address:</strong> <span id="confirmVoter"></span></div>
            <div><strong>Timestamp:</strong> <span id="confirmTime"></span></div>
        </div>
        <button id="backToDashboardConfirm" style="width: 100%;">← BACK TO DASHBOARD</button>
    </div>
</div>

<script type="module" src="./js/user.js"></script>
</body>
</html>
