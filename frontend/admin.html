<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeciVote - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0033 50%, #0f0a1e 100%);
            font-family: 'Orbitron', system-ui;
            padding: 40px 20px;
            color: #eee;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 170, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
            pointer-events: none;
            animation: bgShift 8s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes bgShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto;
        }
        
        h1, h2 { 
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00ffff, #00aeff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 170, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 170, 255, 0.6)); }
        }
        
        h2 { margin-bottom: 16px; }
        
        .card { 
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            padding: 24px; 
            margin-bottom: 24px;
            border: 2px solid rgba(0, 170, 255, 0.3);
            box-shadow: 
                0 0 30px rgba(0, 170, 255, 0.2),
                inset 0 0 30px rgba(0, 170, 255, 0.05);
            animation: cardFadeIn 0.6s ease-out;
        }
        
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        input { 
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid rgba(0, 170, 255, 0.3);
            margin-right: 10px;
            margin-bottom: 12px;
            background: rgba(30, 42, 58, 0.8);
            color: #00ff00;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.1);
        }
        
        input:focus {
            outline: none;
            border-color: rgba(0, 170, 255, 0.8);
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.2), 0 0 20px rgba(0, 170, 255, 0.3);
            color: #00ffff;
        }
        
        input::placeholder { color: rgba(0, 170, 255, 0.5); }
        
        select {
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid rgba(0, 170, 255, 0.3);
            background: rgba(30, 42, 58, 0.8);
            color: #00ff00;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.1);
            cursor: pointer;
        }
        
        select:focus {
            outline: none;
            border-color: rgba(0, 170, 255, 0.8);
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.2), 0 0 20px rgba(0, 170, 255, 0.3);
            color: #00ffff;
        }
        
        select option {
            background: #0a0f1e;
            color: #00ff00;
        }
        
        button { 
            padding: 12px 24px;
            border-radius: 40px;
            border: 2px solid rgba(0, 170, 255, 0.5);
            margin-right: 10px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00aeff, #0088ff);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', system-ui;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        
        button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        button:hover { 
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.6);
            transform: translateY(-3px);
        }
        
        button:active {
            transform: translateY(-1px);
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.8);
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 16px; 
            margin-top: 16px; 
        }
        
        .election-card { 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.6), rgba(30, 42, 58, 0.3));
            border-radius: 20px; 
            padding: 16px;
            border: 2px solid rgba(0, 170, 255, 0.2);
            border-left: 4px solid #00ffff;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: cardSlideIn 0.5s ease-out;
        }
        
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .election-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 170, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .election-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.3);
            border-color: rgba(0, 170, 255, 0.5);
        }
        
        .election-card:hover::before {
            left: 100%;
        }
        
        .election-card h3 {
            color: #00ffff;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        
        .election-card p {
            font-size: 0.9rem;
            color: #00aeff;
            margin-bottom: 8px;
        }
        
        .status-badge { 
            font-size: 0.7rem; 
            background: rgba(0, 170, 255, 0.15);
            padding: 6px 12px; 
            border-radius: 40px; 
            display: inline-block;
            color: #00ffff;
            border: 1px solid rgba(0, 170, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: badgeGlow 2s ease-in-out infinite;
        }
        
        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 170, 255, 0.3); }
            50% { box-shadow: 0 0 15px rgba(0, 170, 255, 0.6); }
        }
        
        #adminStatus {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 12px;
            text-align: center;
            color: #00aeff;
            background: rgba(0, 170, 255, 0.1);
            border: 2px solid rgba(0, 170, 255, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
            animation: statusPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes statusPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚙️ DeciVote Admin Panel</h1>
    <div id="adminStatus">🔌 Connecting wallet...</div>
    <button id="connectWalletBtn" style="width: 100%; margin-bottom: 24px;">🦊 CONNECT METAMASK</button>

    <!-- CREATE ELECTION WITH CANDIDATES -->
    <div class="card">
        <h2>📝 Create Election with Candidates</h2>
        <input type="text" id="electionName" placeholder="Election name" />
        <input type="number" id="candidateCount" placeholder="Number of candidates" value="1" min="1" />
        <input type="datetime-local" id="startTime" />
        <input type="datetime-local" id="endTime" />
        <button id="generateCandidateFormBtn" style="width: 100%;">➕ PREPARE CANDIDATES FORM</button>
        
        <!-- Dynamic candidate form -->
        <div id="candidateFormContainer" style="display: none; margin-top: 20px; border-top: 2px solid rgba(0, 170, 255, 0.3); padding-top: 20px;">
            <h3 style="color: #00ffff; margin-bottom: 16px;">👥 Add Candidates</h3>
            <div id="candidatesInputs"></div>
            <button id="submitAllCandidatesBtn" style="width: 100%; margin-top: 16px;">✓ CREATE ELECTION & ADD CANDIDATES</button>
        </div>
    </div>

    <!-- MANAGE ACTIVE ELECTIONS -->
    <div class="card">
        <h2>⚙️ Manage Active Elections</h2>
        <div id="electionsList" class="grid"></div>
    </div>

    <!-- ADD CANDIDATE TO EXISTING ELECTION -->
    <div class="card">
        <h2>➕ Add Candidate to Election</h2>
        <select id="selectElectionForCandidate" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; background: rgba(30, 42, 58, 0.8); border: 2px solid rgba(0, 170, 255, 0.3); color: #00ff00; font-family: 'Orbitron', monospace;">
            <option value="">-- Select Election --</option>
        </select>
        <input type="text" id="addCandName" placeholder="Candidate name" />
        <input type="text" id="addCandParty" placeholder="Party" />
        <button id="addSingleCandidateBtn" style="width: 100%;">➕ ADD CANDIDATE</button>
    </div>

    <!-- AUTHORIZE VOTERS -->
    <div class="card">
        <h2>👤 Authorize Voters</h2>
        <select id="selectElectionForVoter" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; background: rgba(30, 42, 58, 0.8); border: 2px solid rgba(0, 170, 255, 0.3); color: #00ff00; font-family: 'Orbitron', monospace;">
            <option value="">-- Select Election --</option>
        </select>
        <input type="text" id="voterAddress" placeholder="Voter wallet address (0x...)" />
        <button id="authorizeVoterBtn" style="width: 100%;">✓ AUTHORIZE VOTER</button>
    </div>

    <!-- END ELECTION -->
    <div class="card">
        <h2>🔚 End Election</h2>
        <select id="selectElectionToEnd" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; background: rgba(30, 42, 58, 0.8); border: 2px solid rgba(0, 170, 255, 0.3); color: #00ff00; font-family: 'Orbitron', monospace;">
            <option value="">-- Select Election --</option>
        </select>
        <button id="endElectionBtn" style="width: 100%;">⏹️ END ELECTION</button>
    </div>
</div>
<script type="module" src="./js/admin.js"></script>
</body>
</html>
