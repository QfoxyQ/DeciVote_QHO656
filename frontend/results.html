<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeciVote – Live Results</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0033 50%, #0f0a1e 100%);
            font-family: 'Orbitron', system-ui;
            padding: 40px 20px;
            color: #eee;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 170, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
            pointer-events: none;
            animation: bgShift 8s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes bgShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .container { 
            max-width: 1000px; 
            margin: 0 auto;
        }
        
        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00ffff, #00aeff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            animation: titlePulse 2s ease-in-out infinite;
            text-align: center;
        }
        
        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 170, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 170, 255, 0.6)); }
        }
        
        h2 {
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        
        .result-card { 
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            padding: 24px; 
            margin-bottom: 24px;
            border: 2px solid rgba(0, 170, 255, 0.3);
            box-shadow: 
                0 0 30px rgba(0, 170, 255, 0.2),
                inset 0 0 30px rgba(0, 170, 255, 0.05);
            animation: cardSlideIn 0.6s ease-out;
        }
        
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .candidate-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px 0; 
            border-bottom: 1px solid rgba(0, 170, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .candidate-row:hover {
            background: rgba(0, 170, 255, 0.05);
            padding: 16px 12px;
            border-radius: 8px;
        }
        
        .candidate-name {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .candidate-row small {
            color: #00aeff;
            font-size: 0.85rem;
        }
        
        .candidate-votes {
            color: #00ff64;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        
        .bar-container { 
            background: linear-gradient(90deg, rgba(0, 170, 255, 0.1), rgba(0, 170, 255, 0.05));
            border-radius: 40px; 
            height: 12px; 
            margin: 12px 0 16px;
            border: 1px solid rgba(0, 170, 255, 0.2);
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.1);
        }
        
        .bar-fill { 
            background: linear-gradient(90deg, #00aeff, #00ffff);
            width: 0%; 
            height: 100%; 
            border-radius: 40px; 
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.6);
        }
        
        .bar-fill.animated {
            animation: barGlow 1.5s ease-in-out infinite;
        }
        
        @keyframes barGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 170, 255, 0.6); }
            50% { box-shadow: 0 0 30px rgba(0, 170, 255, 1); }
        }
        
        .total-votes {
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
            font-weight: bold;
            margin-top: 16px;
            border: 1px solid rgba(0, 255, 100, 0.3);
            font-size: 1.1rem;
            letter-spacing: 1px;
            animation: totalPulse 2s ease-in-out infinite;
        }
        
        @keyframes totalPulse {
            0%, 100% { box-shadow: inset 0 0 10px rgba(0, 255, 100, 0.2); }
            50% { box-shadow: inset 0 0 20px rgba(0, 255, 100, 0.3); }
        }
        
        button { 
            background: linear-gradient(135deg, #00aeff, #0088ff);
            color: #000; 
            border: 2px solid rgba(0, 170, 255, 0.5);
            padding: 12px 24px; 
            border-radius: 40px; 
            cursor: pointer; 
            margin-bottom: 20px;
            font-weight: bold;
            font-family: 'Orbitron', system-ui;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        
        button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        button:hover { 
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.6);
            transform: translateY(-3px);
        }
        
        button:active {
            transform: translateY(-1px);
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.8);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading, .error {
            text-align: center;
            padding: 32px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .loading {
            color: #00aeff;
            background: rgba(0, 170, 255, 0.1);
            border: 2px solid rgba(0, 170, 255, 0.3);
            animation: loadingPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes loadingPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .error {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid rgba(255, 68, 68, 0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Live Voting Results</h1>
    <button id="refreshResults" style="width: 100%;">🔄 REFRESH RESULTS</button>
    <div id="resultsContainer"></div>
</div>
<script type="module" src="./js/results.js"></script>
</body>
</html>
